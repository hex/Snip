name: Snip
options:
  bundleIdPrefix: ai.symbiotica
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  SnipKit:
    path: SnipKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  Snip:
    type: application
    platform: macOS
    sources:
      - path: Snip
    dependencies:
      - package: SnipKit
      - package: Sparkle
    info:
      path: Snip/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Snip
        CFBundleDisplayName: Snip
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: ""
        SUFeedURL: https://raw.githubusercontent.com/hex/Snip/main/appcast.xml
        SUPublicEDKey: AvfZk+goO2PNLNs69+o7SfePAMl/w5PLLO+TZ69IKVI=
    entitlements:
      path: Snip/Snip.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.symbiotica.Snip
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "7G4UQW35EL"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
